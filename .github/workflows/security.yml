name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly Mon 06:00 UTC — recupera nuove CVE su deps invariate
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write   # Upload SARIF su GitHub Code Scanning
  packages: write          # Push immagine su ghcr.io
  id-token: write          # Cosign keyless via OIDC

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/small-cmr-base-backend
  BACKEND_PORT: 8001

jobs:

  # ─────────────────────────────────────────────────────────────────
  # 1. Secret scanning sull'intera history git
  # ─────────────────────────────────────────────────────────────────
  gitleaks:
    name: GitLeaks (secret scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  # ─────────────────────────────────────────────────────────────────
  # 2. SCA: scansione dipendenze (requirements.txt + package-lock.json)
  # ─────────────────────────────────────────────────────────────────
  trivy-sca:
    name: Trivy SCA (dependencies)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-sca.sarif'
          severity: 'HIGH,CRITICAL'
          exit-code: '0'
          ignore-unfixed: true
      - name: Upload SARIF to Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-sca.sarif'
          category: 'trivy-sca'

  # ─────────────────────────────────────────────────────────────────
  # 3. Container: build + Trivy scan (+ push + Cosign sign su main)
  # ─────────────────────────────────────────────────────────────────
  container:
    name: Build + Trivy scan + Cosign sign
    runs-on: ubuntu-latest
    needs: [gitleaks, trivy-sca]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build backend image (always; load locally)
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          load: true
          push: false
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}
      - name: Trivy scan immagine
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-image.sarif'
          severity: 'HIGH,CRITICAL'
          exit-code: '0'
          ignore-unfixed: true
      - name: Upload SARIF immagine
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-image.sarif'
          category: 'trivy-image'
      # ── Push + sign solo su main ───────────────────────────────
      - name: Push immagine
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}
      - name: Install Cosign
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: sigstore/cosign-installer@v3
      - name: Sign immagine (keyless OIDC)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: cosign sign --yes ${{ env.IMAGE_NAME }}:${{ github.sha }}

  # ─────────────────────────────────────────────────────────────────
  # 4. DAST: OWASP ZAP full scan contro il backend in esecuzione
  # ─────────────────────────────────────────────────────────────────
  owasp-zap:
    name: OWASP ZAP full scan
    runs-on: ubuntu-latest
    needs: [trivy-sca]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Start backend (sqlite, background)
        working-directory: backend
        env:
          DATABASE_URL: 'sqlite:///./zap-test.db'
          SECRET_KEY: 'zap-test-secret-do-not-use-in-prod'
          ALGORITHM: 'HS256'
          ACCESS_TOKEN_EXPIRE_MINUTES: '480'
          ADMIN_EMAIL: 'admin@zap.test'
          ADMIN_PASSWORD: 'AdminZap2025!'
          ADMIN_NOME: 'Admin'
          ADMIN_COGNOME: 'Zap'
          ADMIN_AZIENDA: 'ZapTest'
          CORS_ORIGINS: 'http://localhost:3000'
          LOG_DIR: ${{ runner.temp }}/logs
        run: |
          nohup python -m uvicorn main:app --host 0.0.0.0 --port ${{ env.BACKEND_PORT }} > /tmp/uvicorn.log 2>&1 &
          for i in {1..30}; do
            if curl -sf http://localhost:${{ env.BACKEND_PORT }}/health; then
              echo "Backend up"; exit 0
            fi
            sleep 2
          done
          cat /tmp/uvicorn.log
          exit 1
      - name: ZAP full scan
        uses: zaproxy/action-full-scan@v0.12.0
        with:
          target: 'http://localhost:${{ env.BACKEND_PORT }}'
          fail_action: false
          allow_issue_writing: false
          artifact_name: zap-report-base
          cmd_options: '-I -j'   # -I: ignore unmodified URLs in spider, -j: AJAX spider
